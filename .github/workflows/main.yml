name: Laravel Security Checks

on:
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: composer install --no-progress --no-suggest

      - name: Run PHPStan (Static Analysis)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Run Psalm (Security Issues)
        run: vendor/bin/psalm --output-format=github

      - name: Run Laravel Security Checker
        run: php artisan security:check

      - name: Run Composer Audit (Check Vulnerabilities)
        run: composer audit --no-dev

      - name: Run Mozilla Security Headers Scan
        run: curl -X POST https://http-observatory.security.mozilla.org/api/v1/analyze?host=yourapp.com
