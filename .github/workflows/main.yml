name: Laravel Security Checks

on:
  workflow_dispatch:  # Allows manual triggering
  pull_request:
    branches: [main]  # Runs on PRs to main

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  # Adjust to your Laravel PHP version

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Install PHPStan (CI Only)
        run: composer require --dev phpstan/phpstan --no-interaction --no-progress

      - name: Debug Installed Packages
        run: ls -l vendor/bin/

      - name: Run PHPStan (Static Analysis)
        run: ./vendor/bin/phpstan analyse app routes database/migrations --memory-limit=1G

      - name: Run Composer Audit (Check for Dependency Vulnerabilities)
        run: composer audit --no-dev
